<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Popup Modal | CodingLab</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="center">
        <a href="#modal" class="btn">Abrir Modal</a>
    </div>

    <div id="modal" class="modal-box">
        <div class="modal-content">
            <a href="#" class="close-btn">&times;</a>
            <div class="title">Notificação</div>
            <p>Este é um exemplo de modal popup criado apenas com HTML e CSS.</p>
            <div class="buttons">
                <a href="#" class="btn">Ok, Entendido</a>
            </div>
        </div>
    </div>

</body>
</html>
